# =========================
# Railway Production Config
# =========================

# -------- SERVER (MUST be dynamic on Railway) --------
server.port=${PORT:8080}

# -------- DATABASE (Railway recommended variables) --------
# Railway provides DATABASE_URL + PG* env vars automatically
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${PGUSER}
spring.datasource.password=${PGPASSWORD}

# Optional but recommended
spring.datasource.driver-class-name=org.postgresql.Driver

# -------- JPA / Hibernate --------
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
# Do NOT force dialect; Hibernate detects it automatically
# spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# -------- JWT --------
# Use ONE of these options:
# Option A (recommended): Base64 secret (must be 32+ bytes AFTER decoding)
app.jwtSecretBase64=${JWT_SECRET_BASE64}
# Option B: raw string secret (must be 32+ chars) - only if you update JwtService to use it
# app.jwtSecret=${JWT_SECRET}

app.jwtExpirationMs=3600000
app.jwtRefreshExpirationMs=86400000
app.jwtClockSkewSeconds=60

# -------- Logging (optional) --------
logging.level.org.hibernate.SQL=INFO
logging.level.org.springframework.security=INFO